<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#0D0D0D" />
  <meta property="og:title" content="FÜNF STERNE FRISEUR by Mido" />
  <meta property="og:description" content="Premium barbershop in Goch. Precision cuts since 2018." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="" /><!-- TODO: add real og:image URL -->

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='28' cy='28' r='13' fill='none' stroke='%23C9A84C' stroke-width='5'/%3E%3Ccircle cx='28' cy='72' r='13' fill='none' stroke='%23C9A84C' stroke-width='5'/%3E%3Cline x1='28' y1='41' x2='82' y2='20' stroke='%23C9A84C' stroke-width='5' stroke-linecap='round'/%3E%3Cline x1='28' y1='59' x2='82' y2='80' stroke='%23C9A84C' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0D0D;
      --text: #F5F0E8;
      --muted: #8A8070;
      --gold: #C9A84C;
      --gold-dim: #9A7A34;
      --gold-pale: rgba(201,168,76,0.15);
      --border: #2E2E2E;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* =====================================================
       LAYER 1 — PHOTO BACKGROUND
       ===================================================== */
    .bg-photos {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      overflow: hidden;
      background: var(--bg);
    }

    .bg-photo {
      background-size: cover;
      background-position: center;
      background-color: #111;
      will-change: transform;
    }

    .bg-photo.kb-1 { animation: kb1 22s ease-in-out infinite alternate; }
    .bg-photo.kb-2 { animation: kb2 26s ease-in-out infinite alternate; }
    .bg-photo.kb-3 { animation: kb3 24s ease-in-out infinite alternate; }
    .bg-photo.kb-4 { animation: kb4 28s ease-in-out infinite alternate; }
    .bg-photo.kb-5 { animation: kb5 21s ease-in-out infinite alternate; }
    .bg-photo.kb-6 { animation: kb6 27s ease-in-out infinite alternate; }

    @keyframes kb1 { from { transform: scale(1.00) translate(0,0); }   to { transform: scale(1.08) translate(-1.5%,-1%); } }
    @keyframes kb2 { from { transform: scale(1.02) translate(0,0); }   to { transform: scale(1.10) translate(1.5%,-1.5%); } }
    @keyframes kb3 { from { transform: scale(0.98) translate(0,0); }   to { transform: scale(1.06) translate(-1%,1.5%); } }
    @keyframes kb4 { from { transform: scale(1.04) translate(0,0); }   to { transform: scale(1.12) translate(2%,1%); } }
    @keyframes kb5 { from { transform: scale(1.00) translate(0,0); }   to { transform: scale(1.07) translate(1%,-2%); } }
    @keyframes kb6 { from { transform: scale(1.02) translate(0,0); }   to { transform: scale(1.09) translate(-2%,1%); } }

    /* Lighter overlay — photos must breathe through the glass */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: rgba(0,0,0,0.28);
      pointer-events: none;
    }

    .bg-vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%);
      pointer-events: none;
    }

    /* =====================================================
       LAYER 2 — LIQUID GLASS CARD
       Apple visionOS / iOS 26 aesthetic:
       - Ultra-low background opacity so photos bleed through
       - Aggressive backdrop-filter blur + brightness + saturate
       - Prismatic border via layered box-shadows & gradient border trick
       - Specular highlight strip at top edge (::before)
       - Subtle inner glow at bottom edge (::after)
       ===================================================== */
    main {
      position: relative;
      z-index: 3;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      position: relative;
      width: 100%;
      max-width: 380px;

      /* Glass fill — very transparent */
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(40px) saturate(180%) brightness(1.08);
      -webkit-backdrop-filter: blur(40px) saturate(180%) brightness(1.08);

      /* Layered border: gradient via padding trick using a pseudo wrapper,
         but we'll use box-shadow stacking for single-element approach */
      border-radius: 26px;
      border: 1px solid rgba(255,255,255,0.18);

      padding: 34px 24px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;

      /* Deep layered shadows for physical depth */
      box-shadow:
        /* Outer ambient */
        0 40px 100px rgba(0,0,0,0.45),
        0 16px 40px rgba(0,0,0,0.35),
        /* Gold prismatic rim at edges */
        0 0 0 0.5px rgba(201,168,76,0.22),
        /* Inner top specular */
        inset 0 1.5px 0 rgba(255,255,255,0.28),
        /* Inner bottom depth */
        inset 0 -1px 0 rgba(0,0,0,0.25),
        /* Subtle gold inner glow */
        inset 0 0 60px rgba(201,168,76,0.04);
    }

    /* Top-edge specular highlight — the "wet glass" catch light */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.55) 30%,
        rgba(201,168,76,0.5) 50%,
        rgba(255,255,255,0.55) 70%,
        transparent
      );
      border-radius: 999px;
      pointer-events: none;
    }

    /* Bottom inner glow — depth illusion */
    .card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 5%;
      right: 5%;
      height: 1px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(201,168,76,0.12) 50%,
        transparent
      );
      pointer-events: none;
    }

    /* ========== LOGO MARK ========== */
    .logo-mark {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,168,76,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      position: relative;
      /* Liquid glass circle */
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow:
        0 8px 24px rgba(0,0,0,0.3),
        inset 0 1px 0 rgba(255,255,255,0.3),
        inset 0 -1px 0 rgba(0,0,0,0.2);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    /* Outer glow ring */
    .logo-mark::before {
      content: '';
      position: absolute;
      inset: -6px;
      border: 1px solid rgba(201,168,76,0.18);
      border-radius: 50%;
    }

    .logo-mark svg {
      width: 28px;
      height: 28px;
      fill: var(--gold);
      filter: drop-shadow(0 0 6px rgba(201,168,76,0.4));
    }

    /* ========== SHOP NAME ========== */
    .shop-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: center;
      line-height: 1.1;
      color: var(--text);
      text-shadow: 0 1px 12px rgba(0,0,0,0.5);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s both;
    }
    .shop-name .gold {
      color: var(--gold);
      filter: drop-shadow(0 0 8px rgba(201,168,76,0.35));
    }

    .by-mido {
      font-size: 0.78rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.08em;
      margin-top: 6px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.25s both;
    }

    .tagline {
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-top: 10px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.3s both;
    }

    /* ========== DIVIDER ========== */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.4s both;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .divider-line::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: shimmerDraw 1.4s ease 0.7s both;
    }

    .divider-icon {
      color: var(--gold);
      font-size: 1rem;
      flex-shrink: 0;
      transform: rotate(-30deg);
      filter: drop-shadow(0 0 6px rgba(201,168,76,0.5));
    }

    @keyframes shimmerDraw {
      from { left: -100%; }
      to   { left: 100%; }
    }

    /* ========== SOCIAL LINK BUTTONS ========== */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 9px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.5s both;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 11px 14px;
      /* Each button is also liquid glass */
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.22s, border-color 0.22s, transform 0.15s, box-shadow 0.22s;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 4px 16px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.15),
        inset 0 -1px 0 rgba(0,0,0,0.15);
    }

    /* Specular sheen on each button */
    .link-btn::before {
      content: '';
      position: absolute;
      top: 0; left: 8%; right: 8%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      pointer-events: none;
    }

    /* Gold left-edge accent on hover */
    .link-btn::after {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 2.5px;
      background: linear-gradient(180deg, var(--gold), var(--gold-dim));
      border-radius: 999px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .link-btn:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(201,168,76,0.45);
      transform: translateY(-1.5px);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.3),
        0 0 0 0.5px rgba(201,168,76,0.2),
        inset 0 1px 0 rgba(255,255,255,0.22),
        inset 0 -1px 0 rgba(0,0,0,0.15);
    }

    .link-btn:hover::after { opacity: 1; }
    .link-btn:active { transform: translateY(0); }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.2);
    }

    .link-icon svg {
      width: 17px;
      height: 17px;
      fill: var(--gold);
      filter: drop-shadow(0 0 4px rgba(201,168,76,0.3));
    }

    .link-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .link-platform {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.38);
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .link-handle {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.88);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      color: rgba(255,255,255,0.28);
      font-size: 0.9rem;
      transition: color 0.2s, transform 0.2s;
    }

    .link-btn:hover .link-arrow {
      color: var(--gold);
      transform: translateX(3px);
    }

    /* ========== APP TEASER ========== */
    .app-teaser {
      width: 100%;
      margin-top: 9px;
      padding: 11px 14px;
      background: rgba(201,168,76,0.04);
      border: 1px dashed rgba(201,168,76,0.35);
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 13px;
      cursor: default;
      pointer-events: none;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.6s both, appGlow 4s ease-in-out 1.5s infinite;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.08),
        inset 0 -1px 0 rgba(0,0,0,0.1);
    }

    /* Shimmer sweep */
    .app-teaser::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.14), transparent);
      animation: appShimmer 3.6s ease-in-out 1.6s infinite;
    }

    .app-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .app-icon svg {
      width: 16px;
      height: 16px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .app-text {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .app-label {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.38);
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .app-status {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    .app-pill {
      color: var(--gold);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 3px 9px;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 999px;
      background: rgba(201,168,76,0.06);
      flex-shrink: 0;
    }

    @keyframes appShimmer {
      0%   { left: -100%; }
      100% { left: 220%; }
    }

    @keyframes appGlow {
      0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 0 0 rgba(201,168,76,0); }
      50%       { box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 0 22px rgba(201,168,76,0.12); }
    }

    /* ========== FOOTER ========== */
    .footer-text {
      margin-top: 24px;
      font-size: 0.62rem;
      font-weight: 400;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.7s both;
    }

    /* ========== ENTRANCE ANIMATION ========== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ========== REDUCED MOTION ========== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-delay: 0s !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
      .bg-photo { animation: none !important; transform: none !important; }
      .card, .logo-mark, .shop-name, .by-mido, .tagline,
      .divider, .links, .app-teaser, .footer-text {
        opacity: 1 !important;
        transform: none !important;
      }
    }
  </style>
</head>

  <div class="bg-photos" id="bgPhotos" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>

  <!-- LAYER 2 — LIQUID GLASS CARD -->
  <main>
    <div class="card">
