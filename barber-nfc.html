<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>FÜNF STERNE FRISEUR by Mido</title>
  <meta name="description" content="Premium barbershop in Goch. Precision cuts since 2018." />
  <meta name="theme-color" content="#0D0D0D" />
  <meta property="og:title" content="FÜNF STERNE FRISEUR by Mido" />
  <meta property="og:description" content="Premium barbershop in Goch. Precision cuts since 2018." />
  <meta property="og:type" content="website" />
  <!-- TODO: add real og:image URL -->
  <meta property="og:image" content="" />

  <!-- Favicon: inline SVG scissors in gold -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='28' cy='28' r='13' fill='none' stroke='%23C9A84C' stroke-width='5'/%3E%3Ccircle cx='28' cy='72' r='13' fill='none' stroke='%23C9A84C' stroke-width='5'/%3E%3Cline x1='28' y1='41' x2='82' y2='20' stroke='%23C9A84C' stroke-width='5' stroke-linecap='round'/%3E%3Cline x1='28' y1='59' x2='82' y2='80' stroke='%23C9A84C' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0D0D;
      --surface: #1A1A1A;
      --border: #2E2E2E;
      --text: #F5F0E8;
      --muted: #8A8070;
      --gold: #C9A84C;
      --gold-dim: #9A7A34;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(20px, env(safe-area-inset-top)) 16px max(20px, env(safe-area-inset-bottom));
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      position: relative;
    }

    /* =====================================================
       LAYER 1 — PHOTO BACKGROUND
       ===================================================== */
    .bg-photos {
      position: fixed;
      inset: 0;
      z-index: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      overflow: hidden;
      background: var(--bg);
    }

    .bg-photo {
      background-size: cover;
      background-position: center;
      background-color: #0a0a0a; /* graceful fallback when image fails */
      will-change: transform;
    }

    /* Ken Burns variants — each photo feels independent */
    .bg-photo.kb-1 { animation: kb1 22s ease-in-out infinite alternate; }
    .bg-photo.kb-2 { animation: kb2 26s ease-in-out infinite alternate; }
    .bg-photo.kb-3 { animation: kb3 24s ease-in-out infinite alternate; }
    .bg-photo.kb-4 { animation: kb4 28s ease-in-out infinite alternate; }
    .bg-photo.kb-5 { animation: kb5 21s ease-in-out infinite alternate; }
    .bg-photo.kb-6 { animation: kb6 27s ease-in-out infinite alternate; }

    @keyframes kb1 { from { transform: scale(1.00) translate(0,0); }     to { transform: scale(1.08) translate(-1.5%, -1%); } }
    @keyframes kb2 { from { transform: scale(1.02) translate(0,0); }     to { transform: scale(1.10) translate(1.5%, -1.5%); } }
    @keyframes kb3 { from { transform: scale(0.98) translate(0,0); }     to { transform: scale(1.06) translate(-1%, 1.5%); } }
    @keyframes kb4 { from { transform: scale(1.04) translate(0,0); }     to { transform: scale(1.12) translate(2%, 1%); } }
    @keyframes kb5 { from { transform: scale(1.00) translate(0,0); }     to { transform: scale(1.07) translate(1%, -2%); } }
    @keyframes kb6 { from { transform: scale(1.02) translate(0,0); }     to { transform: scale(1.09) translate(-2%, 1%); } }

    /* Dark overlay so the card stays readable */
    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background: rgba(13, 13, 13, 0.55);
      pointer-events: none;
    }

    /* Soft radial vignette darkening the edges */
    .bg-vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.5) 100%);
      pointer-events: none;
    }

    /* =====================================================
       LAYER 2 — CENTERED GLASSMORPHISM CARD
       ===================================================== */
    main {
      position: relative;
      z-index: 1;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      position: relative;
      z-index: 3;
      width: 100%;
      max-width: 380px;
      background: rgba(13, 13, 13, 0.80);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid rgba(201, 168, 76, 0.18);
      border-radius: 20px;
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.55),
        0 10px 30px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.02),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* ========== LOGO ========== */
    .logo-mark {
      width: 64px;
      height: 64px;
      border: 1.5px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      position: relative;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.1s both;
    }

    .logo-mark::after {
      content: '';
      position: absolute;
      inset: -5px;
      border: 1px solid rgba(201, 168, 76, 0.18);
      border-radius: 50%;
      pointer-events: none;
    }

    .logo-mark svg {
      width: 28px;
      height: 28px;
      fill: var(--gold);
    }

    /* ========== SHOP NAME ========== */
    .shop-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-align: center;
      line-height: 1.1;
      color: var(--text);
      opacity: 0;
      animation: fadeUp 0.5s ease 0.2s both;
    }

    .shop-name .gold { color: var(--gold); }

    .by-mido {
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-top: 6px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.25s both;
    }

    .tagline {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 12px;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.3s both;
    }

    /* ========== DIVIDER ========== */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.4s both;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }

    .divider-line::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      animation: shimmerDraw 1.4s ease 0.7s both;
    }

    .divider-icon {
      color: var(--gold);
      font-size: 1rem;
      flex-shrink: 0;
      transform: rotate(-30deg);
      line-height: 1;
    }

    @keyframes shimmerDraw {
      from { left: -100%; }
      to   { left: 100%; }
    }

    /* ========== SOCIAL LINKS ========== */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 9px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.5s both;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 11px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: linear-gradient(180deg, var(--gold), var(--gold-dim));
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .link-btn:hover {
      border-color: var(--gold-dim);
      background: #222;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    .link-btn:hover::before { opacity: 1; }

    .link-btn:active { transform: translateY(0); }

    .link-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #242424;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .link-icon svg {
      width: 17px;
      height: 17px;
      fill: var(--gold);
    }

    .link-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      min-width: 0;
    }

    .link-platform {
      display: block;
      font-size: 0.66rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .link-handle {
      display: block;
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-arrow {
      color: var(--muted);
      font-size: 0.95rem;
      transition: color 0.2s, transform 0.2s;
      position: relative;
      z-index: 1;
    }

    .link-btn:hover .link-arrow {
      color: var(--gold);
      transform: translateX(3px);
    }

    /* ========== APP TEASER ========== */
    .app-teaser {
      width: 100%;
      margin-top: 10px;
      padding: 11px 16px;
      background: rgba(26, 26, 26, 0.5);
      border: 1px dashed rgba(201, 168, 76, 0.4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: default;
      pointer-events: none;
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.6s both, appGlow 4s ease-in-out 1.2s infinite;
    }

    .app-teaser::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.18), transparent);
      animation: appShimmer 3.6s ease-in-out 1.3s infinite;
      pointer-events: none;
    }

    .app-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #242424;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid rgba(201, 168, 76, 0.22);
      position: relative;
      z-index: 1;
    }

    .app-icon svg {
      width: 16px;
      height: 16px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .app-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    .app-label {
      display: block;
      font-size: 0.66rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .app-status {
      display: block;
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 500;
    }

    .app-pill {
      position: relative;
      z-index: 1;
      color: var(--gold);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
      padding: 3px 8px;
      border: 1px solid rgba(201, 168, 76, 0.3);
      border-radius: 999px;
      flex-shrink: 0;
    }

    @keyframes appShimmer {
      0%   { left: -100%; }
      100% { left: 220%; }
    }

    @keyframes appGlow {
      0%, 100% { box-shadow: 0 0 0 rgba(201, 168, 76, 0); }
      50%      { box-shadow: 0 0 18px rgba(201, 168, 76, 0.14); }
    }

    /* ========== FOOTER ========== */
    .footer {
      margin-top: 24px;
      font-size: 0.66rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #4A4A4A;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.7s both;
    }

    /* ========== ANIMATIONS ========== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ========== REDUCED MOTION ========== */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-delay: 0s !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
      }
      .bg-photo { animation: none; transform: none !important; }
      .bg-overlay, .bg-vignette { opacity: 1; }
      .card, .logo-mark, .shop-name, .by-mido, .tagline,
      .divider, .links, .app-teaser, .footer { opacity: 1 !important; transform: none !important; }
    }
  </style>
</head>
<body>

  <!-- =====================================================

  <div class="bg-photos" id="bgPhotos" aria-hidden="true"></div>
  <div class="bg-overlay" aria-hidden="true"></div>
  <div class="bg-vignette" aria-hidden="true"></div>

  <!-- =====================================================
       LAYER 2 — FOREGROUND CARD
       ===================================================== -->
  <main>
    <div class="card">

      <!-- Logo mark -->
      <div class="logo-mark" aria-hidden="true">

            <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/></svg>

  </main>

  <script>
    /* ===== MIDO: EASY EDIT SECTION ===== */
    /* Photos are now in the project folder. Drop your real photo URLs here
       (or local filenames next to this HTML) and the cinematic background
       handles the rest — grid, Ken Burns, vignette, overlays. */
    const PHOTOS = [
      'P1 (1).jpeg',   /* TODO: replace with real photo URL or keep local */
      'P1 (2).jpeg',   /* TODO: replace with real photo URL or keep local */
      'P1 (3).jpeg',   /* TODO: replace with real photo URL or keep local */
      'P1 (4).jpeg',   /* TODO: replace with real photo URL or keep local */
      'P1 (5).jpeg',   /* TODO: replace with real photo URL or keep local */
      'P1 (5).jpeg',   /* TODO: replace with real photo URL — duplicates the 6th slot */
    ];

    (function buildBackground() {
      const stage = document.getElementById('bgPhotos');
      if (!stage) return;

      PHOTOS.forEach((src, i) => {
        const tile = document.createElement('div');
        tile.className = 'bg-photo kb-' + (((i % 6) + 1));
        tile.style.backgroundImage = "url('" + src.replace(/'/g, "\\'") + "')";
        // Graceful fallback: if image fails, the slot stays dark — no broken icon.
        tile.addEventListener('error', function () {
          tile.style.backgroundImage = 'none';
        }, true);
        stage.appendChild(tile);
      });
    })();

    // Subtle brand console signature — for the devs who peek 👀
    (function () {
      try {
        console.log(
